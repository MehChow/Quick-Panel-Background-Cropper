<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1440"
  height="3120"
  viewBox="0 0 1440 3120"
  shape-rendering="crispEdges"
>
  <defs>
    <g id="gray-sequence">
      <rect x="0" y="0" width="60" height="60" fill="#101010" />
      <rect x="60" y="0" width="60" height="60" fill="#303030" />
      <rect x="120" y="0" width="60" height="60" fill="#505050" />
      <rect x="180" y="0" width="60" height="60" fill="#707070" />
      <rect x="240" y="0" width="60" height="60" fill="#909090" />
      <rect x="300" y="0" width="60" height="60" fill="#b0b0b0" />
      <rect x="360" y="0" width="60" height="60" fill="#d0d0d0" />
      <rect x="420" y="0" width="60" height="60" fill="#f0f0f0" />
      <rect x="480" y="0" width="60" height="60" fill="#101010" />
      <rect x="540" y="0" width="60" height="60" fill="#303030" />
      <rect x="600" y="0" width="60" height="60" fill="#505050" />
      <rect x="660" y="0" width="60" height="60" fill="#707070" />
      <rect x="720" y="0" width="60" height="60" fill="#909090" />
      <rect x="780" y="0" width="60" height="60" fill="#b0b0b0" />
      <rect x="840" y="0" width="60" height="60" fill="#d0d0d0" />
      <rect x="900" y="0" width="60" height="60" fill="#f0f0f0" />
    </g>
    <pattern
      id="gray-patches"
      width="480"
      height="480"
      patternUnits="userSpaceOnUse"
    >
      <use href="#gray-sequence" x="0" y="0" />
      <use href="#gray-sequence" x="-60" y="60" />
      <use href="#gray-sequence" x="-120" y="120" />
      <use href="#gray-sequence" x="-180" y="180" />
      <use href="#gray-sequence" x="-240" y="240" />
      <use href="#gray-sequence" x="-300" y="300" />
      <use href="#gray-sequence" x="-360" y="360" />
      <use href="#gray-sequence" x="-420" y="420" />
    </pattern>
  </defs>
  <rect width="1440" height="3120" fill="url(#gray-patches)" />
</svg>
